[avatar]
start_visible = true
start_x = 100
start_y = 100
sprite_scale = 1.0
sprite_directory = ""  # empty = use built-in placeholder sprites
poll_interval_ms = 50

[tts]
engine = "kokoro"  # "edge", "kokoro", or "elevenlabs"
voice = "jf_alpha"
kokoro_lang = "en-us"
elevenlabs_api_key = ""
elevenlabs_voice_id = ""
elevenlabs_model = "eleven_flash_v2_5"

[stt]
enabled = true
engine = "realtime"            # "google" or "realtime" (local whisper)
language = "en-US"
cooldown_seconds = 3.0
pause_threshold = 1.2          # seconds of silence before phrase is considered complete
wake_words = ["claude", "hey claude"]
# realtime engine (faster-whisper via RealtimeSTT)
realtime_model = "base"        # tiny / base / small / medium / large-v3
realtime_device = "cuda"       # "cuda" or "cpu"
realtime_silero_sensitivity = 0.4
# google engine (fallback — ignored when engine = "realtime")
energy_threshold = 150
phrase_threshold = 0.1
non_speaking_duration = 0.5

[behavior]
auto_speak = true
